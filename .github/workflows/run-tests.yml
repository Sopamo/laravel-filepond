name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4, 8.5]
        laravel: ["10.*", "11.*", "12.*", "13.*"]
        dependency-version: [prefer-lowest, prefer-stable]
        include:
          - laravel: "10.*"
            testbench: ^8.37
          - laravel: "11.*"
            testbench: ^9.17
          - laravel: "12.*"
            testbench: ^10.11
          - laravel: "13.*"
            testbench: ^11.1
        exclude:
          - laravel: "10.*"
            php: 8.5
          - laravel: "11.*"
            php: 8.1
          - laravel: "12.*"
            php: 8.1
          - laravel: "13.*"
            php: 8.1
          - laravel: "13.*"
            php: 8.2

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require --dev "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

      - name: Adjust PHPUnit config for PHPUnit 10
        if: startsWith(matrix.laravel, '10.')
        run: sed -i 's/ ignoreIndirectDeprecations="true"//' phpunit.xml

      - name: Execute tests
        run: vendor/bin/phpunit
